<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title th:text="${isEdit} ? 'Edit Medicine' : 'Add Medicine'">Add Medicine</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="mb-6">
        <nav class="text-sm text-gray-500 mb-2">
            <a th:href="@{/medicines}" class="hover:text-primary">Medicines</a>
            <span class="mx-2">/</span>
            <span th:text="${isEdit} ? 'Edit' : 'Add New'">Add New</span>
        </nav>
        <h1 class="text-3xl font-bold text-gray-800" th:text="${isEdit} ? 'Edit Medicine' : 'Add New Medicine'">Add New Medicine</h1>
    </div>

    <!-- Form Card -->
    <div class="bg-white rounded-lg shadow-md max-w-2xl">
        <div class="p-6">
            <form th:action="${isEdit} ? @{/medicines/{id}(id=${medicineId})} : @{/medicines}" method="post" class="space-y-6">

                <!-- Name -->
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Medicine Name</label>
                    <input type="text" id="name" name="name" th:value="${medicine.name}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="Enter medicine name" required>
                </div>

                <!-- Manufacturer -->
                <div th:if="${!isEdit}">
                    <label for="manufacturer" class="block text-sm font-medium text-gray-700 mb-1">Manufacturer</label>
                    <select id="manufacturer" name="manufacturer"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" required>
                        <option value="">Select manufacturer</option>
                        <option th:each="mfr : ${manufacturers}" th:value="${mfr}" th:text="${mfr}">Manufacturer</option>
                    </select>
                </div>

                <!-- Manufacturer Display (Edit Mode) -->
                <div th:if="${isEdit}">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Manufacturer</label>
                    <div class="px-4 py-2 bg-gray-100 border border-gray-200 rounded-lg text-gray-600">
                        <span th:text="${currentManufacturer}">PFIZER</span>
                        <span class="text-xs text-gray-400 ml-2">(Cannot be changed)</span>
                    </div>
                </div>

                <!-- Expiry Date -->
                <div>
                    <label for="expiryDate" class="block text-sm font-medium text-gray-700 mb-1">Expiry Date</label>
                    <input type="date" id="expiryDate" name="expiryDate" th:value="${medicine.expiryDate}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
                           required>
                </div>

                <!-- Stock -->
                <div>
                    <label for="stock" class="block text-sm font-medium text-gray-700 mb-1">Stock Quantity</label>
                    <input type="number" id="stock" name="stock" th:value="${medicine.stock}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
                           placeholder="Enter stock quantity" min="0" required>
                </div>

                <!-- Buttons -->
                <div class="flex items-center justify-end gap-4 pt-4 border-t">
                    <a th:href="${isEdit} ? @{/medicines/{id}(id=${medicineId})} : @{/medicines}"
                       class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
                        Cancel
                    </a>
                    <button type="submit"
                            class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors">
                        <span th:text="${isEdit} ? 'Update Medicine' : 'Create Medicine'">Create Medicine</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
