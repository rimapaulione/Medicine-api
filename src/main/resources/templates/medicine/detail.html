<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title th:text="${medicine.name}">Medicine Detail</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="mb-6">
        <nav class="text-sm text-gray-500 mb-2">
            <a th:href="@{/medicines}" class="hover:text-primary">Medicines</a>
            <span class="mx-2">/</span>
            <span th:text="${medicine.name}">Medicine Name</span>
        </nav>
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between">
            <h1 class="text-3xl font-bold text-gray-800" th:text="${medicine.name}">Medicine Name</h1>
            <div class="mt-4 sm:mt-0 flex gap-2">
                <a th:href="@{/medicines/{id}/edit(id=${medicine.id})}"
                   class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
                    <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    Edit
                </a>
                <form th:action="@{/medicines/{id}/delete(id=${medicine.id})}" method="post" class="inline"
                      onsubmit="return confirm('Are you sure you want to delete this medicine? Stock must be 0.');">
                    <button type="submit"
                            class="inline-flex items-center px-4 py-2 border border-red-300 rounded-lg text-red-600 hover:bg-red-50 transition-colors">
                        <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                        Delete
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Medicine Info Card -->
        <div class="lg:col-span-2 bg-white rounded-lg shadow-md">
            <div class="p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Medicine Information</h2>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- ID -->
                    <div>
                        <label class="text-sm font-medium text-gray-500">ID</label>
                        <p class="mt-1 text-lg text-gray-900" th:text="'#' + ${medicine.id}">#1</p>
                    </div>

                    <!-- Manufacturer -->
                    <div>
                        <label class="text-sm font-medium text-gray-500">Manufacturer</label>
                        <p class="mt-1">
                            <span class="px-3 py-1 text-sm font-medium bg-gray-100 text-gray-800 rounded" th:text="${medicine.manufacturer}">PFIZER</span>
                        </p>
                    </div>

                    <!-- Expiry Date -->
                    <div>
                        <label class="text-sm font-medium text-gray-500">Expiry Date</label>
                        <p class="mt-1 text-lg" th:classappend="${#temporals.format(medicine.expiryDate, 'yyyy-MM-dd') < #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')} ? 'text-red-600 font-medium' : 'text-gray-900'">
                            <span th:text="${medicine.expiryDate}">2024-12-31</span>
                            <span th:if="${#temporals.format(medicine.expiryDate, 'yyyy-MM-dd') < #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" class="ml-2 px-2 py-0.5 text-xs font-medium bg-red-100 text-red-800 rounded-full">Expired</span>
                        </p>
                    </div>

                    <!-- Stock -->
                    <div>
                        <label class="text-sm font-medium text-gray-500">Current Stock</label>
                        <p class="mt-1 text-lg font-bold" th:classappend="${medicine.stock <= 10} ? 'text-yellow-600' : 'text-gray-900'">
                            <span th:text="${medicine.stock}">100</span> units
                            <span th:if="${medicine.stock <= 10 and medicine.stock > 0}" class="ml-2 px-2 py-0.5 text-xs font-medium bg-yellow-100 text-yellow-800 rounded-full">Low Stock</span>
                            <span th:if="${medicine.stock == 0}" class="ml-2 px-2 py-0.5 text-xs font-medium bg-red-100 text-red-800 rounded-full">Out of Stock</span>
                        </p>
                    </div>
                </div>

                <!-- Stock Progress Bar -->
                <div class="mt-6">
                    <label class="text-sm font-medium text-gray-500">Stock Level</label>
                    <div class="mt-2 w-full bg-gray-200 rounded-full h-4">
                        <div class="h-4 rounded-full transition-all duration-300"
                             th:classappend="${medicine.stock <= 10} ? 'bg-yellow-500' : 'bg-green-500'"
                             th:style="'width: ' + ${medicine.stock > 100 ? 100 : medicine.stock} + '%'"></div>
                    </div>
                    <p class="mt-1 text-xs text-gray-500">Visual representation (max 100 units)</p>
                </div>
            </div>
        </div>

        <!-- Stock Adjustment Card -->
        <div class="bg-white rounded-lg shadow-md">
            <div class="p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Stock Adjustment</h2>

                <!-- Increase Stock -->
                <form th:action="@{/medicines/{id}/stock/increase(id=${medicine.id})}" method="post" class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Increase Stock</label>
                    <div class="flex gap-2">
                        <input type="number" name="quantity" min="1" value="1"
                               class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="Qty" required>
                        <button type="submit"
                                class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                        </button>
                    </div>
                </form>

                <!-- Decrease Stock -->
                <form th:action="@{/medicines/{id}/stock/decrease(id=${medicine.id})}" method="post">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Decrease Stock</label>
                    <div class="flex gap-2">
                        <input type="number" name="quantity" min="1" value="1"
                               class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"
                               placeholder="Qty" required>
                        <button type="submit"
                                class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                            </svg>
                        </button>
                    </div>
                </form>

                <p class="mt-4 text-xs text-gray-500">
                    Use these controls to adjust inventory. Stock cannot go below 0.
                </p>
            </div>
        </div>

    </div>

    <!-- Back Button -->
    <div class="mt-6">
        <a th:href="@{/medicines}" class="inline-flex items-center text-gray-600 hover:text-primary">
            <svg class="w-5 h-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Medicines
        </a>
    </div>

</div>
</body>
</html>
