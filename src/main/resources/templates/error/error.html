<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Error</title>
</head>
<body>
<div layout:fragment="content">

    <div class="min-h-96 flex items-center justify-center">
        <div class="text-center">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-semibold text-gray-800">Something Went Wrong</h1>
            <p class="text-gray-500 mt-2 mb-2">An unexpected error occurred while processing your request.</p>
            <p class="text-sm text-red-600 mb-6" th:if="${error}" th:text="${error}">Error details</p>
            <div class="flex justify-center gap-4">
                <a th:href="@{/}" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors">
                    Go to Dashboard
                </a>
                <a href="javascript:history.back()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                    Go Back
                </a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
