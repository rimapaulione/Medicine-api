<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Page Not Found</title>
</head>
<body>
<div layout:fragment="content">

    <div class="min-h-96 flex items-center justify-center">
        <div class="text-center">
            <h1 class="text-9xl font-bold text-gray-200">404</h1>
            <h2 class="text-2xl font-semibold text-gray-800 mt-4">Page Not Found</h2>
            <p class="text-gray-500 mt-2 mb-6">The page you're looking for doesn't exist or has been moved.</p>
            <div class="flex justify-center gap-4">
                <a th:href="@{/}" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors">
                    Go to Dashboard
                </a>
                <a th:href="@{/medicines}" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                    View Medicines
                </a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
